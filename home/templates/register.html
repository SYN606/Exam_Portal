{% extends "base.html" %}
{% load static %}

{% block title %}
Register
{% endblock %}

{% block content %}

<section class="min-h-[90vh] flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-8 border border-gray-100">

    <h2 class="text-2xl font-bold text-center text-gray-800">
      Create an Account
    </h2>

    <p class="text-center text-gray-500 text-sm mt-2">
      Start your journey with Exam Portal
    </p>

    <form method="POST" class="mt-6 space-y-4">
      {% csrf_token %}

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-600">Username</label>
        <input type="text" name="username"
          class="w-full mt-1 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
          placeholder="Choose a username" required>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-600">Email</label>
        <input type="email" name="email"
          class="w-full mt-1 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
          placeholder="Enter email" required>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-600">Password</label>
        <input type="password" name="password1"
          class="w-full mt-1 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
          placeholder="Create password" required>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-gray-600">Confirm Password</label>
        <input type="password" name="password2"
          class="w-full mt-1 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
          placeholder="Confirm password" required>
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl font-medium transition shadow">
        Register
      </button>
    </form>

    <!-- Extra -->
    <p class="text-sm text-center text-gray-500 mt-6">
      Already have an account?
      <a href="{% url 'home:login' %}" class="text-indigo-600 hover:underline font-medium">
        Login
      </a>
    </p>

  </div>
</section>

{% endblock %}
